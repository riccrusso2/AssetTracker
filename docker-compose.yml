version: "3.9"

services:
  portfolio:
    build: .
    container_name: portfolio-tracker
    ports:
      - "3000:10000"
    volumes:
      # Persist snapshot data outside the container
      - portfolio_data:/app/data
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=10000

volumes:
  portfolio_data:
    driver: local
